<!DOCTYPE html>
<html>
<head>
    <title id="page-title">Login - Another S3 Manager</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        // Apply system theme on login page and load app name
        (function() {
            function getSystemTheme() {
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', getSystemTheme());

            // Load app name from API
            fetch('/api/app-info')
                .then(response => response.json())
                .then(data => {
                    const appName = data.app_name || 'Another S3 Manager';
                    const appNameElement = document.getElementById('app-name');
                    const pageTitle = document.getElementById('page-title');
                    if (appNameElement) {
                        appNameElement.textContent = appName;
                    }
                    if (pageTitle) {
                        pageTitle.textContent = `Login - ${appName}`;
                    }
                })
                .catch(err => {
                    console.error('Failed to load app name:', err);
                });
        })();
    </script>
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .login-button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 10px;
        }
        #error-message {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="/static/favicon.ico" alt="S3 File Manager" style="width: 64px; height: 64px; vertical-align: middle;">
            <span id="app-name">Another S3 Manager</span>
        </h1>
        <div id="error-message"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary login-button">Login</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
             <a href="https://github.com/kruchenburger/another-s3-manager" class="github-link" target="_blank" rel="noopener">
                 <i class="fa-brands fa-github"></i>
                View on GitHub
             </a>
         </div>
    </div>
    <script>
        // Check if already logged in (cookie-based: ask the server).
        fetch('/api/me', { credentials: 'include' })
            .then(response => {
                if (response.ok) {
                    return response.json().then(me => {
                        // Refresh CSRF + user info in sessionStorage and redirect.
                        sessionStorage.setItem('csrf_token', me.csrf_token || '');
                        sessionStorage.setItem('username', me.username);
                        sessionStorage.setItem('is_admin', String(me.is_admin));
                        sessionStorage.setItem('user', JSON.stringify(me));
                        window.location.replace('/');
                    });
                }
            })
            .catch(() => {
                // Not authenticated — stay on login page.
            });

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'  // ensure browser stores the auth cookie
                });

                if (response.ok) {
                    // Cookie is now set by the server. Fetch /api/me to grab CSRF + user info.
                    const meResponse = await fetch('/api/me', { credentials: 'include' });
                    if (!meResponse.ok) {
                        showError('Login succeeded but failed to load user info');
                        return;
                    }
                    const me = await meResponse.json();
                    // CSRF token is NOT a credential — fine to keep in sessionStorage.
                    sessionStorage.setItem('csrf_token', me.csrf_token || '');
                    sessionStorage.setItem('username', me.username);
                    sessionStorage.setItem('is_admin', String(me.is_admin));
                    sessionStorage.setItem('user', JSON.stringify(me));
                    window.location.replace('/');
                } else {
                    let errorMessage = 'Login failed';
                    try {
                        const error = await response.json();
                        errorMessage = error.detail || errorMessage;
                    } catch (e) {
                        // If response is not JSON, try to get text
                        const text = await response.text();
                        errorMessage = text || `HTTP ${response.status}: ${response.statusText}`;
                    }
                    showError(errorMessage);
                }
            } catch (error) {
                showError('Login failed: ' + error.message);
            }
        }

        function showError(message) {
            // Use safe DOM construction to avoid XSS — error messages may contain server-supplied text.
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '';
            const inner = document.createElement('div');
            inner.className = 'error';
            inner.textContent = message;
            errorDiv.appendChild(inner);
        }
    </script>
</body>
</html>
