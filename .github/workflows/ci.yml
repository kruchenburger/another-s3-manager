name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest --cov
        env:
          JWT_SECRET_KEY: test-secret-key

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

  e2e:
    name: Frontend E2E (Playwright + MinIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        # GHA service containers can't override CMD, so we run MinIO via docker run
        # to control `server /data --console-address`. Network host avoids extra DNS.
        run: |
          docker run -d --name minio --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9000/minio/health/live; then
              echo "MinIO ready"
              break
            fi
            sleep 1
          done
          # Fail loudly if MinIO never came up — otherwise the next mc step
          # gives a confusing error against a dead server.
          curl -fs http://localhost:9000/minio/health/live \
            || { echo "::error::MinIO did not become healthy in 30s"; docker logs minio; exit 1; }

      - name: Seed MinIO bucket
        run: |
          docker run --rm --network host \
            -v "${PWD}/frontend/tests/e2e/fixtures:/fixtures:ro" \
            -v "${PWD}/scripts/ci/seed-minio.sh:/seed.sh:ro" \
            -e MC_HOST=http://localhost:9000 \
            minio/mc:latest \
            sh /seed.sh

      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --all-extras

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Seed admin config (MinIO-e2e role)
        # The Playwright specs expect a role named "MinIO-e2e" pointing at MinIO.
        # We seed it directly in data/config.json so the backend serves it on first start.
        run: |
          mkdir -p data
          cat > data/config.json <<'EOF'
          {
            "roles": [
              {
                "name": "MinIO-e2e",
                "type": "s3_compatible",
                "access_key_id": "minioadmin",
                "secret_access_key": "minioadmin",
                "endpoint_url": "http://localhost:9000",
                "addressing_style": "path",
                "allowed_buckets": ["e2e-test"]
              }
            ],
            "items_per_page": 200,
            "enable_lazy_loading": true,
            "max_file_size": 104857600,
            "disable_deletion": false,
            "auto_inline_extensions": [],
            "password_min_length": 8,
            "password_min_uppercase": 1,
            "password_min_lowercase": 1,
            "password_min_digits": 1,
            "password_min_special": 0
          }
          EOF

      - name: Start backend
        env:
          JWT_SECRET_KEY: ci-test-secret
          # Use a policy-compliant password (8+ chars, upper, lower, digit) so
          # any future test that exercises change-password against this admin
          # doesn't fail. Login itself only checks the bcrypt hash, but having
          # a compliant seed avoids drift if a test later calls /api/me/password.
          ADMIN_PASSWORD: TestPass1
          DATA_DIR: ./data
          S3_FILE_MANAGER_CONFIG: ./data/config.json
          COOKIE_SECURE: "false"
          UVICORN_HOST: "127.0.0.1"
        run: |
          uv run python -m another_s3_manager.main &
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/health; then
              echo "Backend ready"
              break
            fi
            sleep 1
          done
          # Fail loudly if backend never became healthy.
          curl -fs http://localhost:8080/health \
            || { echo "::error::Backend did not become healthy in 30s"; exit 1; }

      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_ADMIN_USERNAME: admin
          E2E_ADMIN_PASSWORD: TestPass1
          E2E_MINIO_ROLE: MinIO-e2e
          E2E_MINIO_BUCKET: e2e-test
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  build:
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: [test-backend, test-frontend, e2e, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: kruchenburger/telegram-notifier@master
        with:
          token: ${{ secrets.TG_NTF_TOKEN }}
          chat_id: ${{ secrets.TG_NTF_CHAT_ID }}
          status: ${{ needs.build.result || needs.test-backend.result }}
