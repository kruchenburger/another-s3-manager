name: Release

# Tag flow: no re-tests and no full rebuild. Every main commit was already
# tested and published as ghcr :<short-sha> by ci.yml; this workflow promotes
# that exact image to :X.Y.Z + :latest (stamping the real APP_VERSION via a
# metadata-only layer, see Dockerfile.release) and creates the GitHub Release.
#
# Consequence: only tag commits that went through a main build — tagging
# anything else fails fast in the "source image" check below.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version and source image
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Verify the tested source image exists
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_tag }}" \
            || { echo "::error::No ghcr :${{ steps.vars.outputs.sha_tag }} image — tag a commit that was built on main (ci.yml build job) first."; exit 1; }

      - name: Promote tested image to release tags
        # Dockerfile.release is FROM the tested :<short-sha> image and only
        # sets ENV APP_VERSION — file-system layers stay byte-identical to
        # what CI tested; buildx resolves each platform from the manifest
        # list, so multi-arch is preserved. Takes seconds, not minutes.
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          # :latest only for stable releases — an -rc prerelease tag must not
          # move it (the empty line the expression yields is filtered out).
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.version }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}:latest', github.repository) || '' }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_tag }}
            BUILD_VERSION=${{ steps.vars.outputs.version }}

  release:
    needs: [promote]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for version
        id: changelog
        run: python3 .github/scripts/extract_changelog.py
        env:
          VERSION: ${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
