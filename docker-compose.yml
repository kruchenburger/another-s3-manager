# Local dev stack — builds the image from source and bind-mounts ./data for SQLite + config.json persistence.
# For a self-host quick start without cloning the repo, see docker-compose.example.yml.
#
# Default port 8080 — this app is standalone (not co-deployed with other kruchenburger
# services). Override with APP_PORT=9000 if 8080 is in use.
#
# IMPORTANT for Linux hosts: the container runs as non-root user `app` (uid 1001).
# Before first `docker compose up`, prepare ./data with the right ownership:
#   mkdir -p data && sudo chown 1001:1001 data
# Without this step SQLite write fails on Linux. macOS / Windows Docker Desktop
# handle UID translation transparently — no chown needed there.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: another-s3-manager-local
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file: .env
    environment:
      - UVICORN_HOST=0.0.0.0
      - DATA_DIR=/app/data
      - S3_FILE_MANAGER_CONFIG=/app/data/config.json
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Healthcheck is defined in the Dockerfile; no override needed here.
