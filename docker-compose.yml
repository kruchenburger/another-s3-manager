services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: another-s3-manager-local
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file: .env
    environment:
      - PORT=8080
      - UVICORN_HOST=0.0.0.0
      - DATA_DIR=/app/data
      - S3_FILE_MANAGER_CONFIG=/app/data/config.json
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      # AWS credentials/config from host (read-only). Required for SSO profiles —
      # token cache lives in ~/.aws/sso/cache/. Refresh on host with:
      #   aws sso login --profile <name>
      - ${USERPROFILE}/.aws:/root/.aws:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
