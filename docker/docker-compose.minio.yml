services:
  minio:
    # Pinned per docker.md "Never use :latest — supply chain risk".
    # Bump together with the matching tag in .github/workflows/ci.yml.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: another-s3-manager-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-seed:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./frontend/tests/e2e/fixtures:/fixtures:ro
      - ./scripts/ci/seed-minio.sh:/seed.sh:ro
    entrypoint: ["/bin/sh", "/seed.sh"]
